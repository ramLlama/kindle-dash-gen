# Example configuration for kindle-dash-gen-nyc.
# Copy to config.toml and edit. config.toml is gitignored (it may hold secrets).

[location]                 # used by the NWS weather API
latitude = 40.7484
longitude = -73.9857

[weather]
user_agent = "kindle-dash-gen-nyc (you@example.com)"   # NWS requires a User-Agent
units = "us"           # display units: "us" (°F), "si" (°C), or "both"
rollover_hour = 20     # after this local hour, high/low show the next day
hourly_hours = 4       # number of upcoming hourly forecasts to include

#^ How do I figure out my station's stop id and lines that go there? Put that info here too. Hopefully it's just a simple manual website/csv lookup.
# Stations are keyed by display name. A station has a max_arrivals cap and one or more
# platform entries ([[stations."Name".platforms]] blocks); the platforms' arrivals are
# merged into a single board and capped at max_arrivals per direction. A platform has one
# GTFS base stop id (N/S suffix handled via direction), so lines on different platforms
# (e.g. the L vs the N/Q/R/W at Union Sq) are separate platform entries under one name.
#
# Finding stop_id and lines: run `python -m kindle_dash_gen_nyc mta list-stations` to dump
# every station as "stop_id <tab> routes <tab> name" and grep it, e.g. `... | grep -i "union sq"`.
# Use the base stop id (e.g. R20), not the N/S-suffixed variant.
[stations."Union Sq"]
max_arrivals = 3           # soonest trains per direction, across all platforms

  [[stations."Union Sq".platforms]]
  lines = ["N", "Q", "R", "W"]
  stop_id = "R20"
  direction = "both"       # "north", "south", or "both"

  [[stations."Union Sq".platforms]]
  lines = ["L"]
  stop_id = "L03"
  direction = "both"

[openrouter]
model = "google/gemini-3.1-flash-lite-image"
# Provide the API key either inline or via a command that prints it:
api_key = { value_from_cmd = "pass show openrouter/key" }
# api_key = { value = "sk-or-..." }
# prompt_template = "./my_prompt.j2"   # optional; omit to use the bundled default

[output]
path = "./out/dashboard.png"
width = 1448               # Kindle Voyage, landscape
height = 1072
gray_levels = 16           # Voyage 4-bit grayscale
rotate = 0                 # degrees, if device mounting differs

[schedule]
interval_minutes = 5
