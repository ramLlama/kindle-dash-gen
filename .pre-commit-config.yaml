# Pre-commit hooks. Install once with:  uv run pre-commit install
# Tools run through `uv run`, so their versions are pinned in pyproject.toml (single source of
# truth) and mypy runs in the project env with all deps + the [tool.mypy] config.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false # mypy checks the whole package (see [tool.mypy] files); needs the graph
        require_serial: true
